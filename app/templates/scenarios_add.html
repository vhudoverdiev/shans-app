{% extends "base.html" %}
{% block title %}Сценарии | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Добавить сценарий</h1>
        </div>
    </div>

    <div class="car-tab-bar shootings-mobile-tab-bar shootings-mobile-tab-bar-add">
        <a href="{{ url_for('scenarios_upcoming') }}" class="car-tab-link shootings-tab-booking {% if active_tab == 'upcoming' %}car-tab-link-active{% endif %}">Активные</a>
        <a href="{{ url_for('scenarios_add') }}" class="car-tab-link shootings-tab-add {% if active_tab == 'add' %}car-tab-link-active{% endif %}">
            <span class="mobile-text-hidden">Добавить сценарий</span>
            <span class="mobile-text-only">+ Добавить</span>
        </a>
        <a href="{{ url_for('scenarios_archive') }}" class="car-tab-link shootings-tab-archive {% if active_tab == 'archive' %}car-tab-link-active{% endif %}">Архив</a>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-form-head">
            <div class="car-form-head-title">Новый сценарий</div>
            <div class="car-form-head-text">Заполни название, дату съёмки и текст сценария.</div>
        </div>

        <form method="POST" class="form-block">
            <div class="car-form-grid">
                <div class="form-group">
                    <label for="title">Название</label>
                    <input id="title" name="title" type="text" class="form-input" value="{{ form_data.title }}" required>
                </div>

                <div class="form-group">
                    <label for="shooting_date">Дата съёмки</label>
                    <input id="shooting_date" name="shooting_date" type="date" class="form-input" value="{{ form_data.shooting_date }}" required>
                </div>
                <div class="form-group">
                    <label for="scenario_status">Статус</label>
                    <select id="scenario_status" name="scenario_status" class="form-input">
                        <option value="in_progress" {% if form_data.scenario_status != 'done' %}selected{% endif %}>В работе</option>
                        <option value="done" {% if form_data.scenario_status == 'done' %}selected{% endif %}>Выполнено</option>
                    </select>
                </div>

                <div class="form-group car-form-full">
                    <label for="scenario_text">Сценарий</label>
                    <textarea id="scenario_text" name="scenario_text" class="form-input car-textarea" maxlength="700" rows="10">{{ form_data.scenario_text }}</textarea>
                </div>
            </div>

            <div class="car-form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
