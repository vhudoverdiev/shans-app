{% extends "base.html" %}

{% block title %}Редактирование бюджета | Шанс{% endblock %}

{% block content %}
<section class="card">
    <div class="section-header">
        <h2>Редактирование записи</h2>
        <a class="button-link" href="{{ url_for('budget') }}">Назад к бюджету</a>
    </div>
</section>

<section class="card">
    <form method="POST" class="form">
        <label for="entry_type">Доход / Расход</label>
        <select id="entry_type" name="entry_type" required>
            <option value="Доход" {% if entry.entry_type == "Доход" %}selected{% endif %}>Доход</option>
            <option value="Расход" {% if entry.entry_type == "Расход" %}selected{% endif %}>Расход</option>
        </select>

        <label for="month_name">Месяц</label>
        <select id="month_name" name="month_name" required>
            {% for month in months %}
            <option value="{{ month }}" {% if entry.month_name == month %}selected{% endif %}>
                {{ month }}
            </option>
            {% endfor %}
        </select>

        <label for="category">Категория</label>
        <select id="category" name="category" required>
            {% for category in categories %}
            <option value="{{ category }}" {% if entry.category == category %}selected{% endif %}>
                {{ category }}
            </option>
            {% endfor %}
        </select>

        <label for="amount">Сумма</label>
        <input
            type="number"
            step="0.01"
            id="amount"
            name="amount"
            value="{{ entry.amount }}"
            required
        >

        <div class="action-buttons">
            <button type="submit">Сохранить изменения</button>
        </div>
    </form>
</section>
{% endblock %}
