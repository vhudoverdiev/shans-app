{% extends "base.html" %}

{% block title %}Добавить работу | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Добавить работу</h1>
        </div>

        <div class="page-actions">
            <a href="{{ url_for('car') }}" class="btn btn-secondary">Назад</a>
        </div>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-form-head">
            <div class="car-form-head-title">Volkswagen Polo 2018</div>
            <div class="car-form-head-text">
                Опиши работы которые планируется сделать или выполнены
            </div>
        </div>

        <form method="post" class="form-block" id="car-manage-form">
            <div class="car-form-grid">
                <div class="form-group">
                    <label for="service_name">Наименование</label>
                    <input
                        type="text"
                        id="service_name"
                        name="service_name"
                        class="form-input"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="status">Статус</label>
                    <select id="status" name="status" class="form-input" required>
                        <option value="Планируется">Планируется</option>
                        <option value="Выполнено">Выполнено</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="period_type">Периодичность</label>
                    <select id="period_type" name="period_type" class="form-input">
                        <option value="">Без периодичности</option>
                        <option value="6 мес">6 мес</option>
                        <option value="12 мес">12 мес</option>
                    </select>
                </div>

                <div class="form-group car-form-full">
                    <label for="detail_description">Описание</label>
                    <textarea
                        id="detail_description"
                        name="detail_description"
                        class="form-input car-textarea"
                        rows="5"
                    ></textarea>
                </div>
            </div>

            <div class="car-complete-top car-manage-done-box" id="done-fields-box">
                <div class="car-form-head-title">Данные для выполненной работы</div>
                <div class="car-form-head-text">
                    Эти поля нужны только для статуса «Выполнено»
                </div>

                <div class="car-form-grid car-manage-inner-grid">
                    <div class="form-group">
                        <label for="service_date">Дата выполнения</label>
                        <input
                            type="month"
                            id="service_date"
                            name="service_date"
                            class="form-input"
                        >
                    </div>

                    <div class="form-group">
                        <label for="mileage">Пробег на замене</label>
                        <input
                            type="number"
                            id="mileage"
                            name="mileage"
                            class="form-input"
                            step="1"
                            min="0"
                        >
                    </div>

                    <div class="form-group">
                        <label for="cost">Стоимость</label>
                        <input
                            type="number"
                            id="cost"
                            name="cost"
                            class="form-input"
                            step="1"
                            min="0"
                        >
                    </div>
                </div>
            </div>

            <div class="car-form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{{ url_for('car') }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</section>

<script>
    const statusField = document.getElementById("status");
    const doneFieldsBox = document.getElementById("done-fields-box");
    const serviceDateField = document.getElementById("service_date");

    function toggleDoneFields() {
        const isDone = statusField.value === "Выполнено";
        doneFieldsBox.style.display = isDone ? "flex" : "none";
        serviceDateField.required = isDone;
    }

    statusField.addEventListener("change", toggleDoneFields);
    toggleDoneFields();
</script>
{% endblock %}
