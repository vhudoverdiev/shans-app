{% extends "base.html" %}
{% block title %}{% if project %}Редактировать фотопроект{% else %}Создать фотопроект{% endif %} | Шанс{% endblock %}

{% block content %}
<section class="photo-project-form-page same-style-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">
                <span class="page-title-strong">{% if project %}Редактировать фотопроект{% else %}Создать фотопроект{% endif %}</span>
                <span class="page-title-light">карточка проекта</span>
            </h1>
        </div>
        <div class="page-actions">
            <a class="btn btn-secondary" href="{% if project %}{{ url_for('planner.photo_project_detail', project_id=project.id) }}{% else %}{{ url_for('planner.photo_projects') }}{% endif %}">Назад</a>
        </div>
    </div>

    <div class="card table-card planner-form-shell planner-form-shell-narrow">
        <form method="post" class="planner-form planner-form-clean">
            <div class="planner-form-grid">
                <div class="form-group">
                    <label>Название проекта</label>
                    <input class="form-input" type="text" name="title" value="{{ project.title if project else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Дата фотопроекта</label>
                    <input class="form-input" type="date" name="project_date" value="{{ project.project_date if project else '' }}">
                </div>
            </div>

            <div class="form-group">
                <label>Идея</label>
                <input class="form-input" type="text" name="idea" value="{{ project.idea if project else '' }}" required>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea class="form-input" name="description" rows="6">{{ project.description if project else '' }}</textarea>
            </div>

            <div class="planner-form-grid">
                <div class="form-group">
                    <label>Статус</label>
                    <select class="form-input" name="project_status">
                        {% for status in project_statuses %}
                        <option value="{{ status }}" {% if project and project.project_status == status %}selected{% endif %}>{{ status }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Цвет акцента</label>
                    <select class="form-input" name="accent_class">
                        {% for accent in accent_options %}
                        <option value="{{ accent.value }}" {% if project and project.accent_class == accent.value %}selected{% endif %}>{{ accent.label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button class="btn btn-primary btn-wide" type="submit">{% if project %}Сохранить изменения{% else %}Создать фотопроект{% endif %}</button>
        </form>
    </div>
</section>
{% endblock %}
