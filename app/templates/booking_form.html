{% extends "base.html" %}
{% block title %}Редактировать запись | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Редактировать запись</h1>
        </div>
        <div class="page-actions">
            <a class="btn btn-secondary" href="{{ url_for('planner.photo_project_detail', project_id=booking.project_id) }}">Назад к проекту</a>
        </div>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-form-head">
            <div class="car-form-head-title">Данные записи</div>
            <div class="car-form-head-text">Обнови клиента, время и оплату записи.</div>
        </div>

        <form method="post" class="form-block">
            <div class="car-form-grid">
                <div class="form-group">
                    <label>Имя клиента</label>
                    <input class="form-input" type="text" name="client_name" required value="{{ booking.client_name }}">
                </div>
                <div class="form-group">
                    <label>Контакты</label>
                    <input class="form-input" type="tel" name="client_contact" required value="{{ booking.client_contact }}" inputmode="tel" pattern="^\\+?[0-9\\s\\-\\(\\)]{7,20}$" title="Только номер телефона">
                </div>

                <div class="form-group">
                    <label>Время</label>
                    <input class="form-input" type="time" name="booking_time" required value="{{ booking.booking_time or '' }}">
                </div>
                <div class="form-group">
                    <label>Длительность</label>
                    <select class="form-input" name="duration_minutes" id="duration_minutes">
                        <option value="15" {% if booking.duration_minutes == 15 %}selected{% endif %}>15 минут</option>
                        <option value="30" {% if booking.duration_minutes == 30 %}selected{% endif %}>30 минут</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Стоимость</label>
                    <input class="form-input" type="number" min="0" step="1" name="price" id="booking_price" value="{{ booking.price }}">
                </div>

                <div class="form-group">
                    <label>Предоплата</label>
                    <input class="form-input" type="number" min="0" step="1" name="prepayment" id="booking_prepayment" value="{{ booking.prepayment }}">
                </div>

                <div class="form-group">
                    <label>Остаток к оплате</label>
                    <input class="form-input" type="text" id="booking_remaining" value="{{ booking.remaining_payment }} ₽" readonly>
                </div>

                <div class="form-group" id="makeup_start_group" style="{% if booking.duration_minutes == 30 %}display:block;{% else %}display:none;{% endif %}">
                    <label>Начало макияжа</label>
                    <input class="form-input" type="time" name="makeup_start_time" id="makeup_start_time" value="{{ booking.makeup_start_time or '' }}">
                </div>

                <div class="form-group">
                    <label>Стоимость</label>
                    <input class="form-input" type="number" min="0" step="1" name="price" id="booking_price" value="{{ booking.price }}">
                </div>

                <div class="form-group">
                    <label>Предоплата</label>
                    <input class="form-input" type="number" min="0" step="1" name="prepayment" id="booking_prepayment" value="{{ booking.prepayment }}">
                </div>

                <div class="form-group">
                    <label>Остаток к оплате</label>
                    <input class="form-input" type="text" id="booking_remaining" value="{{ booking.remaining_payment }} ₽" readonly>
                </div>

                <div class="form-group" id="makeup_start_group" style="{% if booking.duration_minutes == 30 %}display:block;{% else %}display:none;{% endif %}">
                    <label>Начало макияжа</label>
                    <input class="form-input" type="time" name="makeup_start_time" id="makeup_start_time" value="{{ booking.makeup_start_time or '' }}">
                </div>
            </div>

            <div class="car-form-actions">
                <button class="btn btn-primary" type="submit">Сохранить запись</button>
                <a class="btn btn-secondary" href="{{ url_for('planner.photo_project_detail', project_id=booking.project_id) }}">Отмена</a>
            </div>
        </form>
    </div>
</section>
<script>
    (function () {
        const durationField = document.getElementById("duration_minutes");
        const makeupGroup = document.getElementById("makeup_start_group");
        const makeupField = document.getElementById("makeup_start_time");
        const priceField = document.getElementById("booking_price");
        const prepaymentField = document.getElementById("booking_prepayment");
        const remainingField = document.getElementById("booking_remaining");

        if (!durationField || !priceField || !prepaymentField || !remainingField) return;

        function toggleMakeup() {
            const isThirty = durationField.value === "30";
            makeupGroup.style.display = isThirty ? "block" : "none";
            makeupField.required = isThirty;
            if (!isThirty) makeupField.value = "";
        }

        function updateRemaining() {
            const price = Number(priceField.value || 0);
            const prepayment = Number(prepaymentField.value || 0);
            const remaining = Math.max(price - prepayment, 0);
            remainingField.value = `${remaining} ₽`;
        }

        durationField.addEventListener("change", toggleMakeup);
        priceField.addEventListener("input", updateRemaining);
        prepaymentField.addEventListener("input", updateRemaining);
        toggleMakeup();
        updateRemaining();
    })();
</script>
{% endblock %}
