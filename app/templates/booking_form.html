{% extends "base.html" %}
{% block title %}Редактировать запись | Шанс{% endblock %}

{% block content %}
<div class="planner-page narrow-page">
    <div class="page-header">
        <h1 class="page-title">
            <span class="page-title-strong">Редактировать запись</span>
        </h1>
        <div class="page-actions">
            <a class="btn btn-secondary" href="{{ url_for('photo_project_detail', project_id=booking.project_id) }}">Назад</a>
        </div>
    </div>

    <div class="card planner-form-card">
        <form method="post" class="stack-form">
            <label class="form-field">
                <span>Клиент</span>
                <input type="text" name="client_name" required value="{{ booking.client_name }}">
            </label>
            <label class="form-field">
                <span>Контакты</span>
                <input type="text" name="client_contact" required value="{{ booking.client_contact }}">
            </label>
            <div class="form-row-2">
                <label class="form-field">
                    <span>Дата</span>
                    <input type="date" name="booking_date" required value="{{ booking.booking_date }}">
                </label>
                <label class="form-field">
                    <span>Время</span>
                    <input type="time" name="booking_time" value="{{ booking.booking_time or '' }}">
                </label>
            </div>
            <label class="form-field">
                <span>Статус</span>
                <select name="status">
                    {% for status in booking_statuses %}
                    <option value="{{ status }}" {% if booking.status == status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>
            </label>
            <label class="form-field">
                <span>Комментарий</span>
                <textarea name="comment" rows="5">{{ booking.comment or '' }}</textarea>
            </label>
            <button class="btn btn-primary" type="submit">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
