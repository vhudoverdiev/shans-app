{% extends "base.html" %}

{% block title %}Вход | Шанс{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1 class="login-title">Вход в систему</h1>

        <form method="POST" class="form-block">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" class="form-input" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>

                <div class="password-input-wrap">
                    <input type="password" id="password" name="password" class="form-input" autocomplete="current-password" required>

                   <button
                        type="button"
                        class="password-toggle"
                        id="passwordToggle"
                        aria-label="Показать пароль"
                    >
                        <span class="eye-icon"></span>
                    </button>
                </div>

            </div>

            <div class="form-group">
                <label for="remember_me" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="remember_me" name="remember_me">
                    <span>Запомнить меня на этом устройстве</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-wide">
                Войти
            </button>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const passwordInput = document.getElementById("password");
    const passwordToggle = document.getElementById("passwordToggle");

    if (!passwordInput || !passwordToggle) {
        return;
    }

    let hideTimer = null;

    passwordToggle.addEventListener("click", function () {
        passwordInput.type = "text";
        passwordToggle.classList.add("is-visible");
        passwordToggle.setAttribute("aria-label", "Пароль временно показан");

        if (hideTimer) {
            clearTimeout(hideTimer);
        }

        hideTimer = setTimeout(function () {
            passwordInput.type = "password";
            passwordToggle.classList.remove("is-visible");
            passwordToggle.setAttribute("aria-label", "Показать пароль");
        }, 2000);
    });
});
</script>
{% endblock %}
