{% extends "base.html" %}

{% block title %}Завершить работу | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Завершить работу</h1>
        </div>

        <div class="page-actions">
            <a href="{{ url_for('car', tab='planned') }}" class="btn btn-secondary">Назад</a>
        </div>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-complete-top">
            <div class="car-complete-title">{{ service.service_name or "Работа" }}</div>

            <div class="status-change-row">
                <span class="status-pill status-pill-work">{{ service.status or "В работе" }}</span>
                <span class="status-arrow">→</span>
                <span class="status-pill status-pill-done">Выполнено</span>
            </div>

            <div class="car-form-head-text">
                После сохранения работа будет перенесена в выполненные
            </div>
        </div>

        <form method="post" class="form-block">
            <div class="car-form-grid">
                <div class="form-group">
                    <label>Периодичность</label>
                    <input
                        type="text"
                        class="form-input"
                        value="{{ service.period_type or 'Нет' }}"
                        disabled
                    >
                </div>

                <div class="form-group">
                    <label for="service_date">Дата выполнения</label>
                    <input
                        type="month"
                        id="service_date"
                        name="service_date"
                        class="form-input"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="mileage">Пробег</label>
                    <input
                        type="number"
                        id="mileage"
                        name="mileage"
                        class="form-input"
                    >
                </div>

                <div class="form-group">
                    <label for="cost">Стоимость</label>
                    <input
                        type="number"
                        step="0.01"
                        id="cost"
                        name="cost"
                        class="form-input"
                    >
                </div>

                <div class="form-group car-form-full">
                    <label>Описание</label>
                    <textarea
                        class="form-input car-textarea"
                        rows="4"
                        disabled
                    >{{ service.detail_description or '' }}</textarea>
                </div>
            </div>

            <div class="car-form-actions">
                <button type="submit" class="btn btn-success">Перевести в выполненные</button>
                <a href="{{ url_for('car', tab='planned') }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
