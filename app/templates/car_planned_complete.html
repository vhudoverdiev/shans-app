{% extends "base.html" %}

{% block title %}Завершить работу | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Завершить работу</h1>
        </div>

        <div class="page-actions">
            <a href="{{ url_for('car', tab='planned') }}" class="btn btn-secondary">Назад</a>
        </div>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-complete-top">
            <div class="car-complete-title">{{ service.service_name or "Работа" }}</div>

            <div class="status-change-row">
                <span class="status-pill status-pill-work">{{ service.status or "В работе" }}</span>
                <span class="status-arrow">→</span>
                <span class="status-pill status-pill-done">Выполнено</span>
            </div>

            <div class="car-form-head-text">
                После сохранения работа будет перенесена в выполненные
            </div>
        </div>

        <form method="post" class="form-block">
            <div class="car-form-grid">
                <div class="form-group">
                    <label for="service_name">Наименование</label>
                    <input
                        type="text"
                        id="service_name"
                        name="service_name"
                        class="form-input"
                        value="{{ service.service_name or '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="period_type">Периодичность</label>
                    <select id="period_type" name="period_type" class="form-input">
                        <option value="" {% if not service.period_type %}selected{% endif %}>Нет</option>
                        <option value="6 мес" {% if service.period_type == '6 мес' %}selected{% endif %}>6 мес</option>
                        <option value="12 мес" {% if service.period_type == '12 мес' %}selected{% endif %}>12 мес</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="service_date">Дата выполнения</label>
                    <input
                        type="month"
                        id="service_date"
                        name="service_date"
                        class="form-input"
                        value="{{ service.service_date or '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="mileage">Пробег</label>
                    <input
                        type="number"
                        id="mileage"
                        name="mileage"
                        class="form-input"
                        value="{{ service.mileage or '' }}"
                    >
                </div>

                <div class="form-group">
                    <label for="cost">Стоимость</label>
                    <input
                        type="number"
                        step="0.01"
                        id="cost"
                        name="cost"
                        class="form-input"
                        value="{{ service.service_cost or '' }}"
                    >
                </div>

                <div class="form-group car-form-full">
                    <label for="detail_description">Описание</label>
                    <textarea
                        id="detail_description"
                        name="detail_description"
                        class="form-input car-textarea"
                        rows="4"
                    >{{ service.detail_description or '' }}</textarea>
                </div>
            </div>

            <div class="car-form-actions">
                <button type="submit" class="btn btn-success">Перевести в выполненные</button>
                <a href="{{ url_for('car', tab='planned') }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
