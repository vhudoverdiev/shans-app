{% extends "base.html" %}
{% block title %}Подключение 2FA | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Подключи Google Authenticator</h1>
        </div>
    </div>

    <div class="card">
        <p>1. Открой Google Authenticator и добавь новый аккаунт по QR-коду.</p>
        <p>2. Если QR не открывается, введи ключ вручную:</p>
        <div class="form-group">
            <input type="text" readonly class="form-input" value="{{ otp_secret }}">
        </div>
        <div class="form-group">
            <img src="{{ qr_url }}" alt="QR для Google Authenticator" style="max-width:220px;border-radius:12px;border:1px solid #e2e8f0;">
        </div>
        <form method="POST" class="form-block">
            <div class="form-group">
                <label for="otp_code">Код из приложения</label>
                <input type="text" id="otp_code" name="otp_code" class="form-input" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary">Подтвердить и войти</button>
        </form>
    </div>
</section>
{% endblock %}
