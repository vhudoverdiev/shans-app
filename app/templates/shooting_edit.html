{% extends "base.html" %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
        </div>
    </div>

    <div class="car-tab-bar">
        <a href="{{ url_for('shootings_upcoming') }}" class="car-tab-link">Бронь</a>
        <a href="{{ url_for('shootings_archive') }}" class="car-tab-link">Архив</a>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-form-head">
            <div class="car-form-head-title">Редактирование съёмки</div>
            <div class="car-form-head-text">Обнови информацию по бронированию</div>
        </div>

        <form method="POST" class="form-block">
            <div class="car-form-grid">
                <div class="form-group">
                    <label for="project_name">Название съёмки</label>
                    <input id="project_name" name="project_name" type="text" class="form-input" value="{{ shooting.project_name }}" required>
                </div>

                <div class="form-group">
                    <label for="client_name">Клиент</label>
                    <input id="client_name" name="client_name" type="text" class="form-input" value="{{ shooting.client_name }}" required>
                </div>

                <div class="form-group">
                    <label for="shooting_date">Дата съёмки</label>
                    <input id="shooting_date" name="shooting_date" type="date" class="form-input" value="{{ shooting.shooting_date }}" required>
                </div>

                <div class="form-group">
                    <label for="shooting_time">Время съёмки</label>
                    <input id="shooting_time" name="shooting_time" type="time" class="form-input" value="{{ shooting.shooting_time }}">
                </div>

                <div class="form-group">
                    <label for="duration_hours">Количество часов съёмки</label>
                    <input id="duration_hours" name="duration_hours" type="number" min="0.5" step="0.5" class="form-input" value="{{ shooting.duration_hours }}" required>
                </div>

                <div class="form-group">
                    <label for="phone">Телефон</label>
                    <input id="phone" name="phone" type="tel" class="form-input" value="{{ shooting.phone }}" inputmode="tel" pattern="^\\+?[0-9\\s\\-\\(\\)]{7,20}$" title="Только номер телефона">
                </div>

                <div class="form-group">
                    <label for="price">Стоимость</label>
                    <input id="price" name="price" type="number" min="0" step="0.01" class="form-input" value="{{ shooting.price }}">
                </div>

                <div class="form-group">
                    <label for="prepayment">Предоплата</label>
                    <input id="prepayment" name="prepayment" type="number" min="0" step="0.01" class="form-input" value="{{ shooting.prepayment }}">
                </div>

                <div class="form-group car-form-full">
                    <label for="notes">Дополнительная информация</label>
                    <textarea id="notes" name="notes" class="form-input car-textarea">{{ shooting.notes }}</textarea>
                </div>
            </div>

            <div class="car-form-actions">
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
