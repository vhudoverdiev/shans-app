{% extends "base.html" %}
{% block title %}Настройки аккаунта | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Настройки аккаунта</h1>
        </div>
    </div>
    <div class="card">
        <div class="account-profile-line">
            <div class="header-avatar">{{ avatar_letter }}</div>
            <div>
                <div class="stat-label">Пользователь</div>
                <div class="stat-value">{{ current_user.username }}</div>
            </div>
        </div>
        <p>Двухфакторная защита:
            <strong>{% if otp_enabled %}включена{% else %}не включена{% endif %}</strong>
        </p>
    </div>
</section>
{% endblock %}
