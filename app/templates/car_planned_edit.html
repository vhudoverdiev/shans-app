{% extends "base.html" %}

{% block title %}Редактировать планируемую работу | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Редактировать планируемую работу</h1>
        </div>

        <div class="page-actions">
            <a href="{{ url_for('car', tab='planned') }}" class="btn btn-secondary">Назад</a>
        </div>
    </div>

    <div class="card edit-card car-form-card">
        <div class="car-form-head">
            <div class="car-form-head-title">Изменение данных</div>
            <div class="car-form-head-text">Статус здесь менять нельзя</div>
        </div>

        <form method="post" class="form-block">
            <div class="car-form-grid">
                <div class="form-group">
                    <label for="service_name">Наименование</label>
                    <input
                        type="text"
                        id="service_name"
                        name="service_name"
                        class="form-input"
                        value="{{ service.service_name or '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="period_type">Периодичность</label>
                    <select id="period_type" name="period_type" class="form-input">
                        <option value="" {% if not service.period_type %}selected{% endif %}>Нет</option>
                        <option value="6 мес" {% if service.period_type == '6 мес' %}selected{% endif %}>6 мес</option>
                        <option value="12 мес" {% if service.period_type == '12 мес' %}selected{% endif %}>12 мес</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Статус</label>
                    <input
                        type="text"
                        class="form-input"
                        value="{{ service.status or 'Планируется' }}"
                        disabled
                    >
                </div>

                <div class="form-group car-form-full">
                    <label for="detail_description">Описание</label>
                    <textarea
                        id="detail_description"
                        name="detail_description"
                        class="form-input car-textarea"
                        rows="5"
                    >{{ service.detail_description or '' }}</textarea>
                </div>
            </div>

            <div class="car-form-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="{{ url_for('car', tab='planned') }}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
