{% extends "base.html" %}

{% block title %}Съёмки | Шанс{% endblock %}

{% block content %}
<section class="car-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">Съёмки</h1>
        </div>
        <div class="page-actions">
            <a href="{{ url_for('planner.schedule') }}" class="btn btn-secondary">Назад к графику</a>
        </div>
    </div>

    <div class="stats-grid car-stats-grid">
        <div class="stat-card">
            <div class="stat-label">Ближайших съёмок</div>
            <div class="stat-value">{{ upcoming_count }}</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Сегодня</div>
            <div class="stat-value">{{ today }}</div>
        </div>
    </div>

    <div class="car-tab-bar">
        <a href="{{ url_for('shootings_upcoming') }}" class="car-tab-link">Ближайшие</a>
        <a href="{{ url_for('shootings_add') }}" class="car-tab-link">Добавить съёмку</a>
        <a href="{{ url_for('shootings_archive') }}" class="car-tab-link">Архив</a>
    </div>
</section>
{% endblock %}
