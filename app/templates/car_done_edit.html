{% extends "base.html" %}

{% block title %}Редактировать выполненную работу | Шанс{% endblock %}

{% block content %}
<div class="budget-page">
    <div class="page-header">
        <h1 class="page-title"><span class="page-title-strong">Редактирование выполненной работы</span></h1>
        <div class="page-actions">
            <a href="{{ url_for('car') }}" class="btn btn-secondary">Назад</a>
        </div>
    </div>

    <div class="card edit-card">
        <form method="POST" class="form-block">
            <div class="form-group">
                <label for="service_name">Наименование</label>
                <input type="text" id="service_name" name="service_name" value="{{ item.service_name }}" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="service_cost">Стоимость</label>
                <input type="number" id="service_cost" name="service_cost" value="{{ item.service_cost|int }}" class="form-input" step="1" required>
            </div>

            <div class="form-group">
                <label for="mileage">Пробег</label>
                <input type="number" id="mileage" name="mileage" value="{{ item.mileage }}" class="form-input" step="1" required>
            </div>

            <div class="form-group">
                <label for="service_date">Дата</label>
                <input type="month" id="service_date" name="service_date" value="{{ item.service_date }}" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="detail_description">Описание детали</label>
                <input type="text" id="detail_description" name="detail_description" value="{{ item.detail_description }}" class="form-input">
            </div>

            <div class="form-group">
                <label for="status">Статус</label>
                <select id="status" name="status" class="form-input">
                    <option value="Выполнен" {% if item.status == 'Выполнен' %}selected{% endif %}>Выполнен</option>
                    <option value="В работе" {% if item.status == 'В работе' %}selected{% endif %}>В работе</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary btn-wide">Сохранить изменения</button>
        </form>
    </div>
</div>
{% endblock %}
